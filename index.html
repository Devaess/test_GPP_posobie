                opacity: 1;

        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function prepareQuestions() {
            const shuffledQuestions = shuffleArray(questionsData);
            return shuffledQuestions.map(q => {
                const indices = q.options.map((_, i) => i);
                const shuffledIndices = shuffleArray(indices);
                const newOptions = shuffledIndices.map(i => q.options[i]);
                const newCorrect = shuffledIndices.indexOf(q.correct);
                return {
                    text: q.text,
                    options: newOptions,
                    correct: newCorrect
                };
            });
        }

        let questions = [];
        let currentQuestionIndex = 0;
        let correctAnswers = 0;
        let answered = false;
        let totalQuestions = 0;

        const questionText = document.getElementById('question-text');
        const questionNumber = document.getElementById('question-number');
        const optionsList = document.getElementById('options-list');
        const feedback = document.getElementById('feedback');
        const btnNext = document.getElementById('btn-next');
        const currentQSpan = document.getElementById('current-q');
        const totalQSpan = document.getElementById('total-q');
        const questionCard = document.getElementById('question-card');
        const headerBlock = document.getElementById('header-block');
        const resultCard = document.getElementById('result-card');
        const scoreDisplay = document.getElementById('score-display');
        const resultDetail = document.getElementById('result-detail');
        const appContainer = document.getElementById('app-container');

        function loadQuestion(index) {
            const q = questions[index];
            questionNumber.textContent = 'Вопрос ' + (index + 1);
            questionText.textContent = q.text;
            currentQSpan.textContent = index + 1;
            optionsList.innerHTML = '';
            q.options.forEach((option, i) => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.textContent = option;
                li.addEventListener('click', () => selectOption(i, li));
                optionsList.appendChild(li);
            });
            feedback.className = 'feedback';
            feedback.style.display = 'none';
            feedback.textContent = '';
            btnNext.style.display = 'none';
            answered = false;
        }

        function selectOption(selectedIndex, selectedElement) {
            if (answered) return;
            const q = questions[currentQuestionIndex];
            const allOptions = document.querySelectorAll('.option-item');
            allOptions.forEach(opt => opt.classList.add('disabled'));
            answered = true;
            selectedElement.classList.add('selected');
            if (selectedIndex === q.correct) {
                selectedElement.classList.add('correct-answer');
                feedback.className = 'feedback correct';
                feedback.innerHTML = 'Верно!';
                feedback.style.display = 'block';
                correctAnswers++;
            } else {
                selectedElement.classList.add('wrong-answer');
                allOptions[q.correct].classList.add('correct-answer');
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = 'Неверно. Правильный ответ: ' + q.options[q.correct];
                feedback.style.display = 'block';
            }
            btnNext.style.display = 'block';
            btnNext.focus();
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                loadQuestion(currentQuestionIndex);
                appContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                showResults();
            }
        }

        function showResults() {
            questionCard.style.display = 'none';
            optionsList.style.display = 'none';
            feedback.style.display = 'none';
            btnNext.style.display = 'none';
            headerBlock.style.display = 'none';
            resultCard.style.display = 'block';
            const percentage = Math.round((correctAnswers / totalQuestions) * 100);
            let scoreClass = '';
            let message = '';
            if (percentage >= 90) {
                scoreClass = 'perfect';
                message = 'Отлично. Более 90%';
            } else if (percentage >= 80) {
                scoreClass = 'good';
                message = 'Хорошо. Более 80%';
            } else if (percentage >= 70) {
                scoreClass = 'okay';
                message = 'Удовлетворительно. Более 70%';
            } else {
                scoreClass = 'bad';
                message = 'Неудовлетворительно, менее 70%.';
            }
            scoreDisplay.className = 'score ' + scoreClass;
            scoreDisplay.textContent = correctAnswers + ' / ' + totalQuestions;
            resultDetail.innerHTML = '<p>Правильных ответов: ' + correctAnswers + ' из ' + totalQuestions + ' (' + percentage + '%)</p><p>' + message + '</p>';
            appContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function restartTest() {
            questions = prepareQuestions();
            currentQuestionIndex = 0;
            correctAnswers = 0;
            answered = false;
            questionCard.style.display = 'block';
            optionsList.style.display = 'flex';
            feedback.style.display = 'none';
            btnNext.style.display = 'none';
            headerBlock.style.display = 'flex';
            resultCard.style.display = 'none';
            loadQuestion(0);
            appContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        questions = prepareQuestions();
        totalQuestions = questions.length;
        totalQSpan.textContent = totalQuestions;
        loadQuestion(0);
    </script>
